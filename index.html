<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Tolko Workout</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tolko" />
  <meta name="theme-color" content="#0b0b0b" />
  <style>body { background: #0b0b0b; }</style>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="animations/movements.css" />
</head>
<body>
  <div id="app">

    <header id="header">
      <h1>Tolko</h1>
    </header>

    <main id="main">

      <section class="screen" data-screen="routines">
        <div id="daily-quote-card" class="daily-quote-card"></div>
        <div id="routine-list"></div>
      </section>

      <section class="screen" data-screen="library">
        <div id="library-list"></div>
      </section>

      <section class="screen" data-screen="achievements">
        <div id="achievements-list"></div>
      </section>

    </main>

    <nav id="nav">
      <button class="nav-item" data-nav="routines" aria-label="Routines">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
        Routines
      </button>
      <button class="nav-item" data-nav="library" aria-label="Movements">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        Movements
      </button>
      <button class="nav-item" data-nav="achievements" aria-label="Achievements">
        <svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
        Achievements
      </button>
    </nav>

  </div>

  <!-- FAB: create new routine, visible on Routines screen only -->
  <button id="fab" onclick="openRoutineBuilder(null)" aria-label="New routine">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Milestone celebration overlay -->
  <div id="milestone-overlay" role="dialog" aria-modal="true">
    <div class="milestone-badge" id="milestone-emoji"></div>
    <p class="milestone-label">Milestone Unlocked</p>
    <h2 class="milestone-title" id="milestone-title"></h2>
    <p class="milestone-desc"  id="milestone-desc"></p>
    <p class="milestone-theme-pill" id="milestone-theme"></p>
    <button class="btn btn-primary" onclick="closeMilestone()">Let's go!</button>
  </div>

  <!-- Movement detail overlay -->
  <div id="movement-detail" class="overlay" role="dialog" aria-modal="true">
    <div class="overlay-header">
      <button class="overlay-close" onclick="closeMovementDetail()" aria-label="Close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2 class="detail-title"></h2>
      <span></span>
    </div>
    <div class="detail-anim-wrap">
      <div class="detail-anim"></div>
    </div>
    <p class="detail-meta"></p>
    <p class="detail-desc"></p>
  </div>

  <!-- Routine builder overlay -->
  <div id="routine-builder" class="overlay" role="dialog" aria-modal="true">
    <div class="overlay-header">
      <button class="overlay-close" onclick="closeRoutineBuilder()" aria-label="Close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2 id="builder-title">New Routine</h2>
      <button class="overlay-action" onclick="saveCurrentRoutine()">Save</button>
    </div>
    <div class="overlay-scroll">
      <input id="routine-name-input" class="routine-name-input"
             type="text" placeholder="Routine name" maxlength="40" />
      <div id="builder-movements"></div>
      <button class="btn btn-ghost btn-full" onclick="openMovementPicker()">+ Add movement</button>
    </div>
  </div>

  <!-- Movement picker: sits on top of builder -->
  <div id="movement-picker" class="overlay overlay-top" role="dialog" aria-modal="true">
    <div class="overlay-header">
      <button class="overlay-close" onclick="closeMovementPicker()" aria-label="Close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2>Add Movement</h2>
      <span></span>
    </div>
    <div class="overlay-scroll" id="picker-list"></div>
  </div>

  <!-- Workout player overlay -->
  <div id="workout-player" class="overlay overlay-player" role="dialog" aria-modal="true">

    <!-- Playing view -->
    <div id="player-view">
      <div class="player-topbar">
        <button class="overlay-close" onclick="stopWorkout()" aria-label="Exit workout">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <p id="player-progress-text"></p>
        <span></span>
      </div>
      <div class="player-body">
        <div class="player-anim-wrap">
          <div id="player-anim"></div>
        </div>
        <div class="player-info">
          <h2 id="player-movement-name"></h2>
          <p id="player-rep-text"></p>
        </div>
        <div class="player-timer-wrap">
          <svg class="timer-svg" viewBox="0 0 120 120">
            <circle class="timer-track" cx="60" cy="60" r="50"/>
            <circle id="timer-ring"  class="timer-ring"  cx="60" cy="60" r="50"/>
          </svg>
          <span id="timer-digits"></span>
        </div>
      </div>
      <div class="player-footer">
        <button id="pause-btn" class="btn btn-ghost" onclick="togglePause()">Pause</button>
        <button class="btn btn-ghost" onclick="skipMovement()">Skip</button>
      </div>
    </div>

    <!-- Completion view -->
    <div id="complete-view">
      <div class="complete-body">
        <div class="complete-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h2 class="complete-title">Workout done!</h2>
        <p id="complete-routine-name"></p>
        <p id="complete-total"></p>
        <button class="btn btn-primary" onclick="stopWorkout()">Done</button>
      </div>
    </div>

  </div>

  <script src="data/movements.js"></script>
  <script src="data/quotes.js"></script>
  <script src="app.js"></script>
</body>
</html>
