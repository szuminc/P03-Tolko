name: Deploy Tolko PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump SW cache version to commit SHA
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/const CACHE = 'tolko-[^']*'/const CACHE = 'tolko-${SHORT_SHA}'/" sw.js

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
